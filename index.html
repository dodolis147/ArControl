
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArControl - Gestão de Climatização</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
      :root {
        --theme-text: #111827; /* Fallback default */
      }
      body {
        font-family: 'Inter', sans-serif;
        color: var(--theme-text);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @media print {
        .no-print { display: none !important; }
      }

      /* Animação de Alerta Crítico Pulsante */
      @keyframes alert-pulse-glow {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); }
        50% { transform: scale(1.02); box-shadow: 0 0 25px 10px rgba(239, 68, 68, 0.4); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); }
      }
      .animate-alert-pulsing {
        animation: alert-pulse-glow 1.5s infinite ease-in-out;
      }

      @keyframes neon-pulse {
        0% { filter: drop-shadow(0 0 2px #ef4444); }
        50% { filter: drop-shadow(0 0 12px #ef4444); }
        100% { filter: drop-shadow(0 0 2px #ef4444); }
      }
      .animate-neon-text {
        animation: neon-pulse 1s infinite alternate;
      }

      /* Ring expander para o ícone */
      @keyframes ring-expand {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      .notification-ring-vibrant {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4px solid #ef4444;
        animation: ring-expand 1.2s infinite ease-out;
      }
    </style>
